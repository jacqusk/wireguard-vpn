name: Validate Shell Scripts

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  shell-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shell smoke validation
        run: |
          bash tests/smoke/validate-shell-scripts.sh

      - name: Run first-rollout smoke validation
        run: |
          bash tests/smoke/validate-first-rollout-examples.sh