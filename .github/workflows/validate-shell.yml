name: Validate Shell Scripts

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate bash syntax
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            bash -n "$file"
          done