# dnscrypt-proxy configuration for DoH
# DNS traffic exits via redsocks proxy (port 443)

listen_addresses = ['127.0.0.1:5353']
max_clients = 50

# Only use DoH servers, disable legacy DNSCrypt
ipv4_servers = true
ipv6_servers = false
dnscrypt_servers = false
doh_servers = true

# Privacy settings
require_dnssec = false
require_nolog = true
require_nofilter = true

# Force TCP so all DNS queries go through redsocks
force_tcp = true

# Timeouts
timeout = 5000
keepalive = 30

# Use multiple providers for redundancy
server_names = ['cloudflare', 'google']
fallback_resolver = '1.1.1.1:53'
ignore_system_dns = true

# Caching - reduce upstream queries
cache = true
cache_size = 512
cache_min_ttl = 600
cache_max_ttl = 86400

[sources]
  [sources.'public-resolvers']
  urls = ['https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md']
  cache_file = '/var/cache/dnscrypt-proxy/public-resolvers.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
